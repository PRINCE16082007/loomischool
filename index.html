<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquadVertex | School Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
            position: relative;
        }

        /* Animated Background Particles */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 210, 255, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Main Container */
        .container {
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 40px 60px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease-out;
        }

        /* Logo Animation */
        .logo-wrapper {
            margin-bottom: 30px;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .logo-icon {
            font-size: 4rem;
            color: #00d2ff;
            margin-bottom: 15px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 210, 255, 0.5),
                            0 0 40px rgba(0, 210, 255, 0.3),
                            0 0 60px rgba(0, 210, 255, 0.1);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 210, 255, 0.8),
                            0 0 60px rgba(0, 210, 255, 0.5),
                            0 0 90px rgba(0, 210, 255, 0.3);
            }
        }

        .logo-area h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 3s linear infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        .logo-area p {
            font-size: 1.1rem;
            color: #a8c0ff;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .company-tag {
            font-size: 0.85rem;
            color: #6c7a89;
            margin-top: 5px;
        }

        .company-tag span {
            color: #00d2ff;
            font-weight: 600;
        }

        /* Loading Bar */
        .loader-container {
            width: 350px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin: 30px auto;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.3);
        }

        .loader-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5, #00d2ff);
            background-size: 200% auto;
            border-radius: 3px;
            animation: loadProgress 3s ease-in-out forwards, gradientShift 2s linear infinite;
            position: relative;
        }

        .loader-bar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 50px;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.8), transparent);
            animation: shimmer 1s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(400%); }
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            30% { width: 40%; }
            60% { width: 75%; }
            100% { width: 100%; }
        }

        /* Loading Text with Dots */
        .loading-text {
            margin-top: 20px;
            font-size: 1rem;
            color: #a8c0ff;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .loading-text span {
            animation: dots 1.5s infinite;
        }

        .loading-text span:nth-child(2) { animation-delay: 0.2s; }
        .loading-text span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dots {
            0%, 20% { opacity: 0; }
            50% { opacity: 1; }
            80%, 100% { opacity: 0; }
        }

        /* Status Icons */
        .status-icons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 25px;
        }

        .status-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: #00d2ff;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .status-icon.active {
            opacity: 1;
            background: rgba(0, 210, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.4);
            transform: scale(1.1);
        }

        /* Footer Info */
        .footer-info {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.75rem;
            color: #6c7a89;
        }

        .footer-info p {
            margin: 5px 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 30px 40px;
                margin: 20px;
            }
            .logo-area h1 {
                font-size: 2.5rem;
            }
            .loader-container {
                width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- Animated Background Particles -->
    <div class="particles" id="particles"></div>

    <div class="container" id="mainContent">
        <div class="logo-wrapper">
            <div class="logo-icon">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>

        <div class="logo-area">
            <h1>SquadVertex</h1>
            <p>School Management System</p>
            <p class="company-tag">Powered by <span>Galaxy Designs</span></p>
        </div>

        <div class="loader-container">
            <div class="loader-bar" id="loaderBar"></div>
        </div>

        <p class="loading-text" id="statusText">
            Initializing<span>.</span><span>.</span><span>.</span>
        </p>

        <div class="status-icons">
            <div class="status-icon" id="icon1">
                <i class="fas fa-server"></i>
            </div>
            <div class="status-icon" id="icon2">
                <i class="fas fa-database"></i>
            </div>
            <div class="status-icon" id="icon3">
                <i class="fas fa-shield-alt"></i>
            </div>
            <div class="status-icon" id="icon4">
                <i class="fas fa-check-circle"></i>
            </div>
        </div>

        <div class="footer-info">
            <p>© 2024 SquadVertex. All Rights Reserved.</p>
            <p>Founder & CEO: Prince Gahlot</p>
        </div>
    </div>

    <script>
        // Configuration
        const REDIRECT_TIME = 3500;
        const TARGET_PAGE = 'admin_dashboard.html';

        // Create Background Particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.3;
                particlesContainer.appendChild(particle);
            }
        }

        // Initialize
        window.onload = function() {
            createParticles();

            const statusText = document.getElementById('statusText');
            const loaderBar = document.getElementById('loaderBar');
            const mainContent = document.getElementById('mainContent');
            const icons = [
                document.getElementById('icon1'),
                document.getElementById('icon2'),
                document.getElementById('icon3'),
                document.getElementById('icon4')
            ];

            const statusMessages = [
                'Initializing System<span>.</span><span>.</span><span>.</span>',
                'Connecting to Server<span>.</span><span>.</span><span>.</span>',
                'Loading Database<span>.</span><span>.</span><span>.</span>',
                'Verifying Security<span>.</span><span>.</span><span>.</span>',
                'Ready<span>!</span>'
            ];

            // Activate icons sequentially
            icons.forEach((icon, index) => {
                setTimeout(() => {
                    icon.classList.add('active');
                }, (index + 1) * (REDIRECT_TIME / 5));
            });

            // Update status text
            statusMessages.forEach((msg, index) => {
                setTimeout(() => {
                    statusText.innerHTML = msg;
                }, (index + 1) * (REDIRECT_TIME / 5));
            });

            // Handle Redirect
            setTimeout(() => {
                mainContent.style.opacity = '0';
                mainContent.style.transform = 'scale(0.9)';

                setTimeout(() => {
                    window.location.href = TARGET_PAGE;
                }, 500);

            }, REDIRECT_TIME);
        };
    </script>
</body>
</html>

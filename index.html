<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SquadVertex | Loading</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:#fff;
}

/* Main Card */
.container{
    text-align:center;
    padding:40px;
    width:90%;
    max-width:420px;

    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(12px);

    border-radius:16px;
    border:1px solid rgba(255,255,255,0.1);

    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* Logo */
.logo-icon{
    font-size:3rem;
    color:#38bdf8;
    margin-bottom:15px;
}

/* Title */
h1{
    font-size:2.2rem;
    font-weight:700;
    margin-bottom:5px;
}

.subtitle{
    font-size:0.9rem;
    color:#94a3b8;
    margin-bottom:25px;
}

/* Loader */
.loader{
    width:100%;
    height:5px;
    background:#1e293b;
    border-radius:5px;
    overflow:hidden;
}

.loader-bar{
    height:100%;
    width:0%;
    background:#38bdf8;
    animation:load 3s ease forwards;
}

@keyframes load{
    to{width:100%;}
}

/* Status */
.status{
    margin-top:15px;
    font-size:0.85rem;
    color:#94a3b8;
}

/* Footer */
.footer{
    margin-top:25px;
    font-size:0.7rem;
    color:#64748b;
}

</style>
</head>

<body>

<div class="container">

    <div class="logo-icon">
        <i class="fas fa-graduation-cap"></i>
    </div>

    <h1>SquadVertex</h1>
    <div class="subtitle">School Management System</div>

    <div class="loader">
        <div class="loader-bar"></div>
    </div>

    <div class="status" id="statusText">
        Initializing...
    </div>

    <div class="footer">
        © 2024 SquadVertex <br>
        Founder: Prince Gahlot
    </div>

</div>

<script>

const messages = [
    "Initializing...",
    "Connecting to Server...",
    "Loading Data...",
    "Finalizing...",
    "Ready!"
];

let i = 0;

const status = document.getElementById("statusText");

const interval = setInterval(()=>{
    if(i < messages.length){
        status.innerText = messages[i];
        i++;
    } else {
        clearInterval(interval);
    }
}, 600);

// Redirect
setTimeout(()=>{
    window.location.href = "admin_dashboard.html";
}, 3200);

</script>

</body>
</html>
